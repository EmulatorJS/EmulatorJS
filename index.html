<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web PSP Emulator</title>
    <meta name="description" content="Play PSP games in your browser via the PPSSPP core — bring your own ROM." />

    <!--
      coi-serviceworker.js injects Cross-Origin-Isolation headers via a service
      worker so SharedArrayBuffer (required by PPSSPP) is available on static
      hosts that don't let you set custom HTTP headers.

      The dev server (Vite) already sets these headers directly, so the SW
      registration is a no-op during development.
    -->
    <script src="/coi-serviceworker.js"></script>
  </head>
  <body>
    <!--
      #app is where our TypeScript UI mounts.

      The structure built at runtime is:
        #app
          header.app-header
          main.app-main
            section#landing   ← file-picker screen  (hidden once game loads)
            div#ejs-container ← EmulatorJS mounts here (hidden until game loads)
          footer.app-footer
    -->
    <div id="app"></div>

    <noscript>
      <style>
        body { display: flex; align-items: center; justify-content: center;
               height: 100vh; margin: 0; font-family: system-ui, sans-serif;
               background: #111318; color: #d8dce8; text-align: center; padding: 24px; }
      </style>
      <p>JavaScript is required to run Web PSP Emulator.<br>Please enable it in your browser settings.</p>
    </noscript>

    <!-- Vite entry point -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
